<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeek WASM Test</title>
<style>
  body { font-family: monospace; max-width: 960px; margin: 2em auto; padding: 0 1em; }
  h1 { font-size: 1.4em; }
  #status { margin: 0.5em 0; color: #555; }
  #status.ready { color: green; font-weight: bold; }
  #status.error { color: red; }
  #controls { margin: 1em 0; }
  label { font-weight: bold; }
  #output { margin-top: 1.5em; }
  section { margin-bottom: 2em; }
  h2 { font-size: 1em; margin-bottom: 0.3em; border-bottom: 1px solid #ccc; padding-bottom: 0.2em; }
  pre { background: #f4f4f4; padding: 0.8em; overflow-x: auto; font-size: 0.85em;
        white-space: pre; border: 1px solid #ddd; margin: 0; max-height: 400px; overflow-y: auto; }
  pre.stderr { background: #fff8f0; border-color: #f0c060; }
  #spinner { display: none; margin-left: 0.5em; }
</style>
</head>
<body>

<h1>Zeek WASM Test Page</h1>
<div id="status">Loading Zeek WASM...</div>

<div id="controls">
  <div>
    <label for="pcap-input">pcap file (optional):</label>
    <input type="file" id="pcap-input" accept=".pcap,.pcapng" disabled>
  </div>
  <div style="margin-top: 1em;">
    <label for="zeek-script">Zeek script (optional):</label><br>
    <textarea id="zeek-script" rows="8" style="width:100%;font-family:monospace;font-size:0.85em;margin-top:0.3em;"
              placeholder="# e.g.&#10;event dns_request(c: connection, msg: dns_msg, name: string, qtype: count, qclass: count) {&#10;    print fmt(&quot;DNS query: %s&quot;, name);&#10;}"></textarea>
  </div>
  <div style="margin-top: 0.8em;">
    <button id="run-btn" disabled>Run Zeek</button>
    <span id="spinner" style="display:none; margin-left: 0.5em;">&#9696; Running...</span>
  </div>
</div>

<div id="output"></div>

<script>
  // Emscripten pthreads require SharedArrayBuffer, which in turn requires the
  // server to send COOP/COEP headers.  Show a clear error early if missing.
  if (typeof SharedArrayBuffer === 'undefined') {
    document.getElementById('status').textContent =
      'Error: SharedArrayBuffer not available. ' +
      'Serve this page with serve.py (not python3 -m http.server) to enable ' +
      'the required Cross-Origin-Opener-Policy / Cross-Origin-Embedder-Policy headers.';
    document.getElementById('status').className = 'error';
    throw new Error('SharedArrayBuffer unavailable');
  }
</script>

<!-- With MODULARIZE=1, zeek.js no longer sets up a global Module automatically.
     Instead it exports a createZeekModule() factory function.  We load it here
     and then call the factory once per pcap run.
     Requires zeek.wasm, zeek.data, and zeek.worker.js from the same directory.
     Serve with serve.py — plain http.server lacks the COOP/COEP headers
     that SharedArrayBuffer (required for pthreads) needs. -->
<script src="zeek.js"></script>

<script>
  // createZeekModule is now a global factory function injected by zeek.js.
  // Signal ready as soon as the script has loaded (no module init yet).
  document.getElementById('status').textContent = 'Zeek ready';
  document.getElementById('status').className = 'ready';
  document.getElementById('pcap-input').disabled = false;
  document.getElementById('run-btn').disabled = false;

  function renderOutput(outputEl, fs, stdout, stderr) {
    const logFiles = fs.readdir('/work').filter(f => f.endsWith('.log'));
    logFiles.sort();

    if (logFiles.length === 0) {
      outputEl.innerHTML = '<p>Zeek finished but produced no .log files.</p>';
    } else {
      for (const logName of logFiles) {
        const content = fs.readFile('/work/' + logName, { encoding: 'utf8' });
        const section = document.createElement('section');
        const h2 = document.createElement('h2');
        h2.textContent = logName;
        const pre = document.createElement('pre');
        pre.textContent = content;
        section.appendChild(h2);
        section.appendChild(pre);
        outputEl.appendChild(section);
      }
    }

    if (stderr.length > 0) {
      const section = document.createElement('section');
      const h2 = document.createElement('h2');
      h2.textContent = 'stderr';
      const pre = document.createElement('pre');
      pre.className = 'stderr';
      pre.textContent = stderr.join('\n');
      section.appendChild(h2);
      section.appendChild(pre);
      outputEl.appendChild(section);
    }

    if (stdout.length > 0) {
      const section = document.createElement('section');
      const h2 = document.createElement('h2');
      h2.textContent = 'stdout';
      const pre = document.createElement('pre');
      pre.textContent = stdout.join('\n');
      section.appendChild(h2);
      section.appendChild(pre);
      outputEl.appendChild(section);
    }

    return logFiles.length;
  }

  // Serialise runs: only one Zeek instance at a time.
  let running = false;

  document.getElementById('run-btn').addEventListener('click', async function () {
    if (running) return;
    running = true;

    const statusEl  = document.getElementById('status');
    const spinner   = document.getElementById('spinner');
    const outputEl  = document.getElementById('output');
    const runBtn    = document.getElementById('run-btn');
    const pcapInput = document.getElementById('pcap-input');

    const file       = pcapInput.files[0] || null;
    const scriptText = document.getElementById('zeek-script').value.trim();

    statusEl.textContent = file ? 'Running Zeek on ' + file.name + '...' : 'Running Zeek...';
    statusEl.className   = '';
    spinner.style.display = 'inline';
    runBtn.disabled      = true;
    outputEl.innerHTML   = '';

    const stdout = [];
    const stderr = [];

    try {
      const pcapBytes = file ? new Uint8Array(await file.arrayBuffer()) : null;

      // Each call to createZeekModule() produces a fresh, independent runtime
      // instance.  The .wasm binary and .data file are already cached by the
      // browser, so re-instantiation is fast.
      const zeekDone = new Promise((resolve, reject) => {
        createZeekModule({
          // Don't call main() automatically; we drive it via callMain below.
          noInitialRun: true,

          print: function(text) {
            stdout.push(text);
            console.log('[zeek]', text);
          },

          printErr: function(text) {
            stderr.push(text);
            console.warn('[zeek stderr]', text);
          },

          preRun: [function(m) {
            m.FS.mkdir('/work');
            m.FS.chdir('/work');
            if (pcapBytes) m.FS.writeFile('/work/input.pcap', pcapBytes);
            if (scriptText) m.FS.writeFile('/work/custom.zeek', scriptText);
          }],

          onExit: function(code) {
            if (code === 0) resolve({ code, fs: this.FS });
            else reject(Object.assign(new Error('Zeek exited with code ' + code), { fs: this.FS }));
          },

          // After the module is fully initialised, kick off main().
          // With PROXY_TO_PTHREAD, callMain() returns immediately; main() runs
          // in a Worker thread and onExit fires when it calls exit().
          onRuntimeInitialized: function() {
            const args = [];
            if (pcapBytes) args.push('-r', '/work/input.pcap', '--no-checksums');
            if (scriptText) args.push('/work/custom.zeek');
            this.callMain(args);
          },
        }).catch(reject);
      });

      const { fs } = await zeekDone;

      const nLogs = renderOutput(outputEl, fs, stdout, stderr);
      statusEl.textContent = 'Done — ' + nLogs + ' log file(s)' + (file ? ' from ' + file.name : '');
      statusEl.className   = 'ready';

    } catch (err) {
      statusEl.textContent = 'Error: ' + (err && err.message ? err.message : String(err));
      statusEl.className   = 'error';
      console.error(err);
      if (err && err.fs) renderOutput(outputEl, err.fs, stdout, stderr);
      else if (stderr.length > 0) {
        const section = document.createElement('section');
        const h2 = document.createElement('h2');
        h2.textContent = 'stderr';
        const pre = document.createElement('pre');
        pre.className = 'stderr';
        pre.textContent = stderr.join('\n');
        section.appendChild(h2);
        section.appendChild(pre);
        outputEl.appendChild(section);
      }
    } finally {
      spinner.style.display = 'none';
      runBtn.disabled = false;
      running = false;
    }
  });
</script>

</body>
</html>
